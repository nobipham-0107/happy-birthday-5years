<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center h-screen overflow-hidden">

    <div id="password-screen" class="fixed inset-0 flex items-center justify-center bg-pink-100 z-[100] transition-opacity duration-1000" style="background-color: #FFF0F5;">
    <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4">
        <h2 class="font-love text-3xl text-pink-600 mb-6">Mật mã yêu thương</h2>
        <input type="password" id="password-input" placeholder="Nhập mật khẩu..." 
               class="w-full px-4 py-2 border-2 border-pink-200 rounded-full focus:outline-none focus:border-pink-500 text-center mb-4">
        
        <div class="flex flex-col gap-2">
            <button onclick="checkPassword()" 
                    class="bg-pink-500 text-white px-8 py-2 rounded-full hover:bg-pink-600 transition-all shadow-md active:scale-95">
                Mở khóa
            </button>
            
            <button onclick="showHint()" class="text-pink-400 text-sm hover:underline mt-2 focus:outline-none">
                Gợi ý nè? 💡
            </button>
        </div>

        <p id="password-error" class="text-red-500 text-sm mt-3 hidden">Sai mật khẩu rồi, thử lại nhé! ❤️</p>
        <p id="hint-text" class="text-gray-500 text-sm mt-3 italic hidden"></p>
    </div>
</div>

<div id="setup" class="hidden text-center z-10">
    <div class="floating text-8xl mb-8 cursor-pointer" onclick="openGift()">🎁</div>
    <p class="text-pink-500 animate-pulse text-lg font-semibold">Chạm vào món quà dành cho em...</p>
</div>

    <div id="main-content" class="hidden text-center p-6 max-w-lg z-10">
        <h1 class="font-love text-6xl text-pink-600 mb-6 opacity-0 translate-y-4 transition-all duration-1000" id="title">
            Happy Birthday!
        </h1>
        <div class="card-glass p-8 rounded-3xl shadow-xl opacity-0 scale-95 transition-all duration-1000" id="card">
            <p class="text-gray-700 text-2xl leading-relaxed mb-6 opacity-0" id="wish-text"></p>
            <p class="text-pink-600 font-bold italic text-xl opacity-0" id="closing-text"></p>
        </div>
    </div>

    <div id="volume-control" class="fixed bottom-5 right-5 flex items-center bg-white/30 backdrop-blur-md p-2 rounded-full shadow-lg opacity-0 transition-opacity duration-1000 z-50">
        <span class="mr-2">🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-24 accent-pink-500 cursor-pointer">
    </div>

    <audio id="birthday-audio" src="birthday-song.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
